name: Publish CLI to npm

on:
  push:
    tags:
      - cli-v*

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish is-ai-native package
    runs-on: ubuntu-latest
    env:
      EXPECTED_TAG: ${{ github.ref_name }}

    steps:
      - name: Check out source repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Validate trusted publishing configuration
        shell: bash
        run: |
          set -euo pipefail

          expected_version="${EXPECTED_TAG#cli-v}"
          package_version=$(node --input-type=module -e "import packageJson from './packages/cli/package.json' with { type: 'json' }; process.stdout.write(packageJson.version)")

          if [[ "${EXPECTED_TAG}" == "${expected_version}" ]]; then
            echo "Tag must use the cli-v<version> format. Received: ${EXPECTED_TAG}"
            exit 1
          fi

          if [[ "${package_version}" != "${expected_version}" ]]; then
            echo "Tag version ${expected_version} does not match packages/cli/package.json version ${package_version}."
            exit 1
          fi

          echo "Configure npm trusted publishing for package is-ai-native with:"
          echo "- GitHub organization/user: webmaxru"
          echo "- Repository: is-ai-native"
          echo "- Workflow filename: publish-cli.yml"

      - name: Install workspace dependencies
        run: npm ci

      - name: Build CLI
        run: npm run build:cli

      - name: Test CLI
        run: npm run test:cli

      - name: Pack CLI tarball
        run: npm run pack:cli

      - name: Upload CLI package artifact
        uses: actions/upload-artifact@v4
        with:
          name: is-ai-native-cli-package
          path: artifacts/cli/pack/is-ai-native-*.tgz
          if-no-files-found: error

      - name: Publish CLI to npm
        run: npm publish ./packages/cli --access public

  standalone:
    name: Build standalone CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Check out source repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install workspace dependencies
        run: npm ci

      - name: Build standalone CLI bundle
        run: npm run build:cli:standalone

      - name: Package Linux standalone bundle
        if: runner.os == 'Linux'
        run: tar -C artifacts/cli/standalone/linux-x64 -czf artifacts/cli/is-ai-native-linux-x64.tar.gz .

      - name: Package Windows standalone bundle
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path artifacts/cli/standalone/win32-x64/* -DestinationPath artifacts/cli/is-ai-native-win32-x64.zip

      - name: Upload standalone CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: is-ai-native-cli-${{ runner.os }}
          path: |
            artifacts/cli/is-ai-native-linux-x64.tar.gz
            artifacts/cli/is-ai-native-win32-x64.zip
          if-no-files-found: error

  release:
    name: Publish CLI release assets
    runs-on: ubuntu-latest
    needs:
      - publish
      - standalone

    steps:
      - name: Download npm package artifact
        uses: actions/download-artifact@v4
        with:
          name: is-ai-native-cli-package
          path: release-assets

      - name: Download Linux standalone artifact
        uses: actions/download-artifact@v4
        with:
          name: is-ai-native-cli-Linux
          path: release-assets

      - name: Download Windows standalone artifact
        uses: actions/download-artifact@v4
        with:
          name: is-ai-native-cli-Windows
          path: release-assets

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/**/is-ai-native-*.tgz
            release-assets/is-ai-native-linux-x64.tar.gz
            release-assets/is-ai-native-win32-x64.zip
name: CD

on:
  push:
    branches:
      - main

concurrency:
  group: is-ai-native-production
  cancel-in-progress: true

# Required for OIDC-based Azure login (no long-lived credentials)
permissions:
  id-token: write   # Exchange OIDC token for Azure access token
  contents: read    # Checkout code
  packages: write   # Push image to GitHub Container Registry
  security-events: write  # Upload Trivy SARIF results
  actions: read     # Required by codeql-action/upload-sarif

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  MONITORING_ALERT_EMAIL: salnikov@gmail.com
  # Update these to match your Azure environment
  AZURE_RESOURCE_GROUP: is-ai-native-rg
  AZURE_LOCATION: eastus2

jobs:
  # ── Build & push container image to GHCR ──────────────────────────
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}
      digest: ${{ steps.build.outputs.digest }}
      immutable_image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Security scan the pushed image ────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-push.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

      - name: Upload Trivy SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results-cd
          path: trivy-results.sarif
          if-no-files-found: ignore

  # ── Deploy to Azure Container Apps via Bicep ──────────────────────
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: [build-push, security-scan]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC — no stored credentials)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        run: |
          az group create \
            --name "${{ env.AZURE_RESOURCE_GROUP }}" \
            --location "${{ env.AZURE_LOCATION }}" \
            --tags application=is-ai-native managedBy=github-actions \
            --output none

      - name: Deploy / update Azure infrastructure
        id: bicep
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
          template: infra/main.bicep
          # NOTE: .bicepparam files cannot be mixed with inline overrides.
          # All runtime parameters are passed inline; static defaults come from main.bicep.
          # Keep one idle replica warm for faster startup. Change this back to
          # containerStartupStrategy=scale-to-zero to restore zero idle cost.
          parameters: >
            containerImage=${{ needs.build-push.outputs.immutable_image }}
            githubToken=${{ secrets.GH_TOKEN_FOR_SCAN }}
            enableSharing=true
            enableAvailabilityMonitoring=true
            containerStartupStrategy=keep-warm
            monitoringAlertEmail=${{ secrets.MONITORING_ALERT_EMAIL != '' && secrets.MONITORING_ALERT_EMAIL || env.MONITORING_ALERT_EMAIL }}
            monitoringUrl=${{ secrets.SITE_ORIGIN }}
            siteOrigin=${{ secrets.SITE_ORIGIN }}
            customDomainName=${{ secrets.CUSTOM_DOMAIN_NAME }}
            managedCertName=${{ secrets.MANAGED_CERT_NAME }}
            secondaryCustomDomainName=${{ secrets.SECONDARY_CUSTOM_DOMAIN_NAME }}
            secondaryManagedCertName=${{ secrets.SECONDARY_MANAGED_CERT_NAME }}
          failOnStdErr: false

      - name: Print application URL
        run: echo "✅ Deployed to ${{ steps.bicep.outputs.appUrl }}"

      - name: Install Azure Container Apps CLI extension
        run: |
          az extension add --name containerapp --upgrade --allow-preview true

      - name: Wait for latest revision to become healthy
        id: revision-health
        shell: bash
        env:
          CONTAINER_APP_NAME: ${{ steps.bicep.outputs.containerAppName }}
        run: |
          set -euo pipefail

          latest_revision=""
          for attempt in {1..30}; do
            latest_revision=$(az containerapp revision list \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --query "sort_by(@, &properties.createdTime)[-1].name" \
              -o tsv)

            if [[ -n "$latest_revision" ]]; then
              echo "Latest revision: $latest_revision"
              echo "latest_revision=$latest_revision" >> "$GITHUB_OUTPUT"
              break
            fi

            sleep 10
          done

          if [[ -z "$latest_revision" ]]; then
            echo "No revision found after deployment"
            exit 1
          fi

          for attempt in {1..36}; do
            provisioning_state=$(az containerapp revision show \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --revision "$latest_revision" \
              --query "properties.provisioningState" \
              -o tsv)

            running_state=$(az containerapp revision show \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --revision "$latest_revision" \
              --query "properties.runningState" \
              -o tsv)

            active=$(az containerapp revision show \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --revision "$latest_revision" \
              --query "properties.active" \
              -o tsv)

            replicas=$(az containerapp revision show \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --revision "$latest_revision" \
              --query "properties.replicas" \
              -o tsv)

            echo "Attempt $attempt: provisioning=$provisioning_state running=$running_state active=$active replicas=${replicas:-0}"

            if [[ "$provisioning_state" == "Provisioned" && "$running_state" == "Running" && "$active" == "true" && "${replicas:-0}" != "0" ]]; then
              exit 0
            fi

            if [[ "$provisioning_state" == "Provisioning failed" || "$running_state" == "Failed" || "$running_state" == "Degraded" || "$running_state" == "Activation failed" ]]; then
              echo "Revision entered unhealthy state"
              exit 1
            fi

            sleep 10
          done

          echo "Revision did not become healthy in time"
          exit 1

      - name: Smoke test deployed endpoints
        shell: bash
        env:
          APP_URL: ${{ steps.bicep.outputs.appUrl }}
        run: |
          set -euo pipefail

          echo "Health check: $APP_URL/health"
          curl --fail --show-error --silent \
            --retry 12 \
            --retry-all-errors \
            --retry-delay 10 \
            "$APP_URL/health"

          echo "Homepage check: $APP_URL/"
          curl --fail --show-error --silent \
            --retry 6 \
            --retry-all-errors \
            --retry-delay 10 \
            "$APP_URL/" > /tmp/homepage.html

          grep -q "github.com/" /tmp/homepage.html

          for asset in /favicon.ico /favicon.svg /favicon-32x32.png /favicon-16x16.png /social-card.png /social-card.svg; do
            echo "Asset check: $APP_URL$asset"
            headers=$(curl --fail --show-error --silent --head \
              --retry 6 \
              --retry-all-errors \
              --retry-delay 10 \
              "$APP_URL$asset")

            echo "$headers" | grep -i "^cross-origin-resource-policy: cross-origin"
          done

      - name: Dump Azure diagnostics on failed deployment validation
        if: failure()
        shell: bash
        env:
          CONTAINER_APP_NAME: ${{ steps.bicep.outputs.containerAppName }}
        run: |
          set +e

          echo "Container app summary"
          az containerapp show \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --output jsonc

          echo "Revision summary"
          az containerapp revision list \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --output table

          if [[ -n "${{ steps.revision-health.outputs.latest_revision }}" ]]; then
            echo "Replica summary"
            az containerapp replica list \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
              --revision "${{ steps.revision-health.outputs.latest_revision }}" \
              --output table
          fi

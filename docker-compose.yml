services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REPORTS_DIR=/app/data/reports
      - ENABLE_SHARING=true
      - GH_TOKEN_FOR_SCAN=${GH_TOKEN_FOR_SCAN:-}
      - APPLICATIONINSIGHTS_CONNECTION_STRING=${APPLICATIONINSIGHTS_CONNECTION_STRING:-}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-}
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    restart: unless-stopped
